<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #222535;
      --border: #2e3347;
      --accent: #6c63ff;
      --accent-dim: #4f49c7;
      --text: #e8eaf0;
      --muted: #7a8099;
      --danger: #e05a5a;
      --success: #52c88a;
      --cat-food: #f59e42;
      --cat-transport: #38bdf8;
      --cat-shopping: #f472b6;
      --cat-bills: #e05a5a;
      --cat-entertainment: #a78bfa;
      --cat-other: #7a8099;
      --radius: 10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      font-size: 14px;
    }

    /* ── Layout ── */
    .app-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 32px;
      height: 56px;
    }
    .logo { font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }
    .logo span { color: var(--text); }

    nav { display: flex; gap: 4px; }
    nav button {
      background: none; border: none; color: var(--muted); padding: 6px 14px;
      border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500;
      transition: all .15s;
    }
    nav button:hover { color: var(--text); background: var(--surface2); }
    nav button.active { color: var(--accent); background: rgba(108,99,255,.15); }

    .main { max-width: 1100px; margin: 0 auto; padding: 28px 20px; }

    /* ── Views ── */
    .view { display: none; }
    .view.active { display: block; }

    /* ── Summary Cards ── */
    .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; margin-bottom: 28px; }
    .summary-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px 20px;
    }
    .summary-card .label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .6px; margin-bottom: 8px; }
    .summary-card .value { font-size: 26px; font-weight: 700; color: var(--text); }
    .summary-card .sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* ── Category Breakdown ── */
    .breakdown { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
    .breakdown h3 { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 16px; }
    .cat-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .cat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .cat-name { flex: 1; font-size: 13px; }
    .cat-bar-wrap { flex: 2; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .cat-bar { height: 100%; border-radius: 3px; transition: width .4s ease; }
    .cat-amount { font-size: 13px; font-weight: 600; min-width: 70px; text-align: right; }

    /* ── Filters ── */
    .filters {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px;
      display: grid; grid-template-columns: 1fr 1fr 1fr 1fr auto; gap: 10px;
      align-items: end; margin-bottom: 18px;
    }
    .filters label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; display: block; margin-bottom: 5px; }
    .filters input, .filters select {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 7px 10px; border-radius: 6px; font-size: 13px;
    }
    .filters input:focus, .filters select:focus { outline: none; border-color: var(--accent); }

    /* ── Table ── */
    .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      text-align: left; padding: 11px 14px; font-size: 11px; color: var(--muted);
      text-transform: uppercase; letter-spacing: .5px;
      border-bottom: 1px solid var(--border); background: var(--surface2);
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .12s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }
    tbody td { padding: 11px 14px; font-size: 13px; }

    .cat-badge {
      display: inline-block; padding: 3px 9px; border-radius: 12px;
      font-size: 11px; font-weight: 600; letter-spacing: .3px;
    }
    .amount-cell { font-weight: 700; font-size: 14px; }

    .action-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      padding: 4px 10px; border-radius: 5px; cursor: pointer; font-size: 12px;
      margin-left: 4px; transition: all .15s;
    }
    .action-btn:hover { color: var(--text); border-color: var(--muted); }
    .action-btn.delete:hover { color: var(--danger); border-color: var(--danger); }

    .empty-state { text-align: center; padding: 48px 20px; color: var(--muted); }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.65);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 28px; width: 460px; max-width: 95vw;
      transform: translateY(14px); transition: transform .2s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal h2 { font-size: 16px; font-weight: 700; margin-bottom: 20px; }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-grid .full { grid-column: 1 / -1; }
    .form-group label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; display: block; margin-bottom: 6px; }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 9px 12px; border-radius: 7px; font-size: 14px;
      font-family: inherit;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { outline: none; border-color: var(--accent); }
    .form-group textarea { resize: vertical; min-height: 72px; }
    .form-error { color: var(--danger); font-size: 11px; margin-top: 4px; }

    .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }

    .btn { padding: 9px 20px; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all .15s; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-dim); }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--muted); }
    .btn-add { background: var(--accent); color: #fff; display: flex; align-items: center; gap: 7px; }

    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .page-header h1 { font-size: 20px; font-weight: 700; }
    .page-header .sub { font-size: 13px; color: var(--muted); margin-top: 2px; }

    .toast {
      position: fixed; bottom: 24px; right: 24px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 12px 18px; font-size: 13px; z-index: 200;
      transform: translateY(10px); opacity: 0; transition: all .2s;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: var(--success); color: var(--success); }
    .toast.error { border-color: var(--danger); color: var(--danger); }

    /* month nav */
    .month-nav { display: flex; align-items: center; gap: 12px; }
    .month-nav button { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 14px; }
    .month-nav button:hover { border-color: var(--accent); }
    .month-label { font-size: 15px; font-weight: 600; min-width: 140px; text-align: center; }

    @media (max-width: 680px) {
      .filters { grid-template-columns: 1fr 1fr; }
      .form-grid { grid-template-columns: 1fr; }
      .summary-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<header class="app-header">
  <div class="logo">spnd<span>.</span></div>
  <nav>
    <button class="active" onclick="switchView('expenses')">Expenses</button>
    <button onclick="switchView('summary')">Summary</button>
  </nav>
</header>

<div class="main">

  <!-- ── Expenses View ── -->
  <div id="view-expenses" class="view active">
    <div class="page-header">
      <div>
        <h1>All Expenses</h1>
        <div class="sub" id="expense-count">Loading...</div>
      </div>
      <button class="btn btn-add" onclick="openModal()">＋ Add Expense</button>
    </div>

    <div class="filters">
      <div>
        <label>Search title</label>
        <input type="text" id="f-title" placeholder="Coffee..." oninput="debouncedLoad()" />
      </div>
      <div>
        <label>Category</label>
        <select id="f-category" onchange="loadExpenses()">
          <option value="">All</option>
          <option>Food</option><option>Transport</option><option>Shopping</option>
          <option>Bills</option><option>Entertainment</option><option>Other</option>
        </select>
      </div>
      <div>
        <label>From</label>
        <input type="date" id="f-from" onchange="loadExpenses()" />
      </div>
      <div>
        <label>To</label>
        <input type="date" id="f-to" onchange="loadExpenses()" />
      </div>
      <div>
        <button class="btn btn-secondary" onclick="clearFilters()">Clear</button>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Title</th>
            <th>Category</th>
            <th>Date</th>
            <th>Amount</th>
            <th>Note</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="expense-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- ── Summary View ── -->
  <div id="view-summary" class="view">
    <div class="page-header">
      <div>
        <h1>Monthly Summary</h1>
        <div class="sub">Spending breakdown by category</div>
      </div>
      <div class="month-nav">
        <button onclick="changeMonth(-1)">‹</button>
        <div class="month-label" id="month-label"></div>
        <button onclick="changeMonth(1)">›</button>
      </div>
    </div>

    <div class="summary-grid">
      <div class="summary-card">
        <div class="label">Total Spent</div>
        <div class="value" id="s-total">—</div>
        <div class="sub" id="s-count">— expenses</div>
      </div>
      <div class="summary-card">
        <div class="label">Top Category</div>
        <div class="value" id="s-top-cat">—</div>
        <div class="sub" id="s-top-amount">—</div>
      </div>
      <div class="summary-card">
        <div class="label">Daily Average</div>
        <div class="value" id="s-daily">—</div>
        <div class="sub">per day this month</div>
      </div>
    </div>

    <div class="breakdown">
      <h3>By Category</h3>
      <div id="cat-breakdown"></div>
    </div>
  </div>
</div>

<!-- ── Add/Edit Modal ── -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOnOverlay(event)">
  <div class="modal">
    <h2 id="modal-title">Add Expense</h2>
    <div class="form-grid">
      <div class="form-group full">
        <label>Title *</label>
        <input type="text" id="f-title-in" placeholder='e.g. "Coffee at Starbucks"' maxlength="255" />
        <div class="form-error" id="err-title"></div>
      </div>
      <div class="form-group">
        <label>Amount *</label>
        <input type="number" id="f-amount" placeholder="0.00" min="0.01" step="0.01" />
        <div class="form-error" id="err-amount"></div>
      </div>
      <div class="form-group">
        <label>Category *</label>
        <select id="f-cat-in">
          <option value="">Select...</option>
          <option>Food</option><option>Transport</option><option>Shopping</option>
          <option>Bills</option><option>Entertainment</option><option>Other</option>
        </select>
        <div class="form-error" id="err-category"></div>
      </div>
      <div class="form-group">
        <label>Date *</label>
        <input type="date" id="f-date-in" />
      </div>
      <div class="form-group full">
        <label>Note (optional)</label>
        <textarea id="f-note" placeholder="Any extra details..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveExpense()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = '';
  let editingId = null;
  let summaryYear = new Date().getFullYear();
  let summaryMonth = new Date().getMonth() + 1;

  const CAT_COLORS = {
    Food: '#f59e42', Transport: '#38bdf8', Shopping: '#f472b6',
    Bills: '#e05a5a', Entertainment: '#a78bfa', Other: '#7a8099'
  };

  // ── View Switching ──
  function switchView(name) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(`view-${name}`).classList.add('active');
    event.target.classList.add('active');
    if (name === 'summary') loadSummary();
    if (name === 'expenses') loadExpenses();
  }

  // ── Expenses ──
  async function loadExpenses() {
    const params = new URLSearchParams();
    const title = document.getElementById('f-title').value.trim();
    const cat = document.getElementById('f-category').value;
    const from = document.getElementById('f-from').value;
    const to = document.getElementById('f-to').value;
    if (title) params.append('title', title);
    if (cat) params.append('category', cat);
    if (from) params.append('date_from', from);
    if (to) params.append('date_to', to);

    try {
      const res = await fetch(`${API}/api/expenses?${params}`);
      const data = await res.json();
      renderExpenses(data);
    } catch {
      showToast('Failed to load expenses', 'error');
    }
  }

  function renderExpenses(expenses) {
    const tbody = document.getElementById('expense-tbody');
    document.getElementById('expense-count').textContent =
      `${expenses.length} expense${expenses.length !== 1 ? 's' : ''} found`;

    if (!expenses.length) {
      tbody.innerHTML = `<tr><td colspan="6">
        <div class="empty-state">
          <div class="icon">🧾</div>
          <p>No expenses found. Try adjusting your filters or add a new expense.</p>
        </div>
      </td></tr>`;
      return;
    }

    tbody.innerHTML = expenses.map(e => `
      <tr>
        <td><strong>${esc(e.title)}</strong></td>
        <td><span class="cat-badge" style="background:${CAT_COLORS[e.category]}22;color:${CAT_COLORS[e.category]}">${esc(e.category)}</span></td>
        <td>${formatDate(e.date)}</td>
        <td class="amount-cell">₹${formatNum(e.amount)}</td>
        <td style="color:var(--muted);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(e.note || '—')}</td>
        <td>
          <button class="action-btn" onclick="editExpense(${e.id})">Edit</button>
          <button class="action-btn delete" onclick="deleteExpense(${e.id})">Delete</button>
        </td>
      </tr>
    `).join('');
  }

  async function deleteExpense(id) {
    if (!confirm('Delete this expense?')) return;
    const res = await fetch(`${API}/api/expenses/${id}`, { method: 'DELETE' });
    if (res.ok) { showToast('Expense deleted', 'success'); loadExpenses(); }
    else showToast('Delete failed', 'error');
  }

  async function editExpense(id) {
    const res = await fetch(`${API}/api/expenses/${id}`);
    const e = await res.json();
    editingId = id;
    document.getElementById('modal-title').textContent = 'Edit Expense';
    document.getElementById('f-title-in').value = e.title;
    document.getElementById('f-amount').value = e.amount;
    document.getElementById('f-cat-in').value = e.category;
    document.getElementById('f-date-in').value = e.date;
    document.getElementById('f-note').value = e.note || '';
    openModal();
  }

  // ── Modal ──
  function openModal() {
    if (editingId === null) {
      document.getElementById('modal-title').textContent = 'Add Expense';
      document.getElementById('f-title-in').value = '';
      document.getElementById('f-amount').value = '';
      document.getElementById('f-cat-in').value = '';
      document.getElementById('f-date-in').value = today();
      document.getElementById('f-note').value = '';
    }
    clearErrors();
    document.getElementById('modal-overlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    editingId = null;
  }

  function closeModalOnOverlay(e) {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  }

  async function saveExpense() {
    clearErrors();
    const title = document.getElementById('f-title-in').value.trim();
    const amount = parseFloat(document.getElementById('f-amount').value);
    const category = document.getElementById('f-cat-in').value;
    const date = document.getElementById('f-date-in').value;
    const note = document.getElementById('f-note').value.trim();

    let valid = true;
    if (!title) { setError('err-title', 'Title is required'); valid = false; }
    if (!amount || amount <= 0) { setError('err-amount', 'Enter a valid amount > 0'); valid = false; }
    if (!category) { setError('err-category', 'Select a category'); valid = false; }
    if (!valid) return;

    const body = { title, amount, category, date: date || today(), note: note || null };
    const url = editingId ? `${API}/api/expenses/${editingId}` : `${API}/api/expenses`;
    const method = editingId ? 'PUT' : 'POST';

    try {
      const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      if (!res.ok) { const d = await res.json(); showToast(d.detail || 'Save failed', 'error'); return; }
      showToast(editingId ? 'Expense updated' : 'Expense added', 'success');
      closeModal();
      loadExpenses();
    } catch { showToast('Network error', 'error'); }
  }

  // ── Summary ──
  async function loadSummary() {
    const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    document.getElementById('month-label').textContent = `${MONTHS[summaryMonth-1]} ${summaryYear}`;

    try {
      const res = await fetch(`${API}/api/summary/monthly?year=${summaryYear}&month=${summaryMonth}`);
      const d = await res.json();

      document.getElementById('s-total').textContent = `₹${formatNum(d.total)}`;
      document.getElementById('s-count').textContent = `${d.expense_count} expense${d.expense_count !== 1 ? 's' : ''}`;

      const entries = Object.entries(d.by_category).sort((a,b) => b[1]-a[1]);
      if (entries.length) {
        document.getElementById('s-top-cat').textContent = entries[0][0];
        document.getElementById('s-top-amount').textContent = `₹${formatNum(entries[0][1])}`;
      } else {
        document.getElementById('s-top-cat').textContent = '—';
        document.getElementById('s-top-amount').textContent = 'No data';
      }

      // Daily avg — days elapsed in month
      const today = new Date();
      let daysElapsed = (summaryYear === today.getFullYear() && summaryMonth === today.getMonth()+1)
        ? today.getDate() : daysInMonth(summaryYear, summaryMonth);
      document.getElementById('s-daily').textContent = daysElapsed > 0 ? `₹${formatNum(d.total / daysElapsed)}` : '—';

      // Breakdown bars
      const maxVal = entries.length ? entries[0][1] : 1;
      document.getElementById('cat-breakdown').innerHTML = entries.length
        ? entries.map(([cat, amt]) => `
          <div class="cat-row">
            <div class="cat-dot" style="background:${CAT_COLORS[cat]}"></div>
            <div class="cat-name">${cat}</div>
            <div class="cat-bar-wrap">
              <div class="cat-bar" style="width:${(amt/maxVal*100).toFixed(1)}%;background:${CAT_COLORS[cat]}"></div>
            </div>
            <div class="cat-amount">₹${formatNum(amt)}</div>
          </div>`).join('')
        : '<div style="color:var(--muted);text-align:center;padding:24px">No expenses this month</div>';
    } catch { showToast('Failed to load summary', 'error'); }
  }

  function changeMonth(delta) {
    summaryMonth += delta;
    if (summaryMonth > 12) { summaryMonth = 1; summaryYear++; }
    if (summaryMonth < 1)  { summaryMonth = 12; summaryYear--; }
    loadSummary();
  }

  // ── Helpers ──
  function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function today() { return new Date().toISOString().split('T')[0]; }
  function formatDate(d) {
    const [y,m,day] = d.split('-');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${parseInt(day)} ${months[parseInt(m)-1]} ${y}`;
  }
  function formatNum(n) {
    return Number(n).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  function daysInMonth(y, m) { return new Date(y, m, 0).getDate(); }
  function setError(id, msg) { document.getElementById(id).textContent = msg; }
  function clearErrors() { ['err-title','err-amount','err-category'].forEach(id => document.getElementById(id).textContent = ''); }
  function clearFilters() {
    document.getElementById('f-title').value = '';
    document.getElementById('f-category').value = '';
    document.getElementById('f-from').value = '';
    document.getElementById('f-to').value = '';
    loadExpenses();
  }

  let debounceTimer;
  function debouncedLoad() { clearTimeout(debounceTimer); debounceTimer = setTimeout(loadExpenses, 300); }

  function showToast(msg, type='success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast show ${type}`;
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  // ── Init ──
  document.getElementById('f-date-in').value = today();
  loadExpenses();
</script>
</body>
</html>
